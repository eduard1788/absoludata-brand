name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'webpage/app/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webpage/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webpage/app/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Hashed, immutable Next.js assets — long cache, uploaded first so HTML
      # never references a chunk that hasn't landed in S3 yet.
      - run: |
          aws s3 sync out/_next s3://${{ secrets.S3_BUCKET }}/_next \
            --cache-control "public,max-age=31536000,immutable"

      # Everything else (HTML, /public assets, 404.html) — short cache since
      # CloudFront is explicitly invalidated on every deploy.
      - run: |
          aws s3 sync out s3://${{ secrets.S3_BUCKET }} \
            --delete --exclude "_next/*" \
            --cache-control "public,max-age=0,must-revalidate"

      - run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
