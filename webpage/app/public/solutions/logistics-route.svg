<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" fill="none">
  <rect width="700" height="500" fill="#1E293B"/>
  <circle cx="120" cy="100" r="110" fill="#38BDF8" opacity="0.05"/>
  <circle cx="600" cy="420" r="130" fill="#06C362" opacity="0.05"/>

  <!-- Route path with pins -->
  <path d="M90 150 C 220 110, 260 260, 350 220 S 520 130, 610 150" stroke="#475569" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" fill="none"/>
  <g>
    <circle cx="90" cy="150" r="10" fill="#38BDF8"/>
    <path d="M90 150 m0 -22 a22 22 0 1 0 0.01 0" stroke="#38BDF8" stroke-width="3" fill="none" opacity="0.4"/>
  </g>
  <g>
    <circle cx="610" cy="150" r="10" fill="#06C362"/>
    <path d="M610 150 m0 -22 a22 22 0 1 0 0.01 0" stroke="#06C362" stroke-width="3" fill="none" opacity="0.4"/>
  </g>

  <!-- Package matched via AI -->
  <g>
    <path d="M400 150 l30 -17 30 17 -30 17 Z" fill="#38BDF8"/>
    <path d="M400 150 l0 34 30 17 0 -34 Z" fill="#2E9FD6"/>
    <path d="M460 150 l0 34 -30 17 0 -34 Z" fill="#38BDF8" opacity="0.85"/>
  </g>
  <path d="M430 128 L430 108" stroke="#06C362" stroke-width="3" stroke-dasharray="1 6" stroke-linecap="round"/>
  <path d="M430 90 L440 106 L455 108 L444 118 L447 133 L430 125 L413 133 L416 118 L405 108 L420 106 Z" fill="#06C362"/>

  <!-- Road -->
  <rect x="0" y="330" width="700" height="90" fill="#0F172A"/>
  <g stroke="#475569" stroke-width="4" stroke-dasharray="26 20">
    <line x1="0" y1="375" x2="700" y2="375"/>
  </g>

  <!-- Truck (solid, moving forward with cargo) -->
  <g>
    <rect x="150" y="300" width="160" height="70" rx="8" fill="#06C362"/>
    <path d="M310 320 h46 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-46 Z" fill="#0EA5E9"/>
    <rect x="322" y="332" width="26" height="20" rx="3" fill="#E0F2FE" opacity="0.8"/>
    <circle cx="195" cy="378" r="20" fill="#0F172A" stroke="#94A3B8" stroke-width="4"/>
    <circle cx="195" cy="378" r="7" fill="#94A3B8"/>
    <circle cx="335" cy="378" r="20" fill="#0F172A" stroke="#94A3B8" stroke-width="4"/>
    <circle cx="335" cy="378" r="7" fill="#94A3B8"/>
    <rect x="168" y="316" width="60" height="10" rx="4" fill="#0F172A" opacity="0.25"/>
  </g>

  <!-- Ghost truck: the empty-return problem, being eliminated -->
  <g opacity="0.28">
    <rect x="470" y="310" width="130" height="56" rx="8" fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="6 6"/>
    <circle cx="500" cy="374" r="15" fill="none" stroke="#94A3B8" stroke-width="3"/>
    <circle cx="600" cy="374" r="15" fill="none" stroke="#94A3B8" stroke-width="3"/>
  </g>
  <g stroke="#F87171" stroke-width="6" stroke-linecap="round">
    <path d="M500 300 L580 360"/>
    <path d="M580 300 L500 360"/>
  </g>

  <!-- Cost / fuel savings indicators -->
  <g>
    <circle cx="80" cy="440" r="24" fill="#06C362" opacity="0.15" stroke="#06C362" stroke-width="2"/>
    <text x="80" y="448" fill="#06C362" font-family="sans-serif" font-weight="bold" font-size="20" text-anchor="middle">$</text>
  </g>
  <path d="M112 430 l14 -8 -3 10 10 -2 -21 16 Z" fill="#06C362"/>
</svg>
